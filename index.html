<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" /> 
    <link rel="stylesheet" href="./fonts/fonts.css">
    <link rel="stylesheet" href="./styles/globals.css">
    <link rel="stylesheet" href="./styles/style.css">
    <title>Выбор продукта</title>
  </head>
  <body class="page">
    <header class="header">
      <img class="fotter_logo" src="./images/footer.svg">
    </header>
    <main class="main">
      <button class="new-person-btn" id="newPersonBtn">
        Новый респондент
      </button>
    <section class="menu"> 
      <ul class="product-list">
      </ul>
    </section>
    </main>
    <!-- <footer class="footer">
      <img class="fotter_logo" src="./images/footer.svg">
    </footer> -->
    <dialog class="card-dialog" id="cardDialog">
      <div class="dialog-content">
        <h2 class="dialog-title">Введите номер карты ЛЕНТА</h2>
        
        <form method="dialog" class="dialog-form">
          <input 
            type="text" 
            class="dialog-input" 
            id="cardInput" 
            placeholder="1234 5678 9012 3456"
            maxlength="19"
          >
          
          <div class="dialog-buttons">
            <button type="submit" class="dialog-btn save-btn" id="saveCardBtn">
              Сохранить
            </button>
            <button type="button" class="dialog-btn close-btn" id="closeDialogBtn">
              ✕
            </button>
          </div>
        </form>
      </div>
    </dialog>
    <script src="./scripts/script.js"></script>
  </body>
</html>
